
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depósito Pro - Lucas</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root { --primary: #1e293b; --entry: #10b981; --exit: #ef4444; --accent: #3b82f6; --warning: #f59e0b; --bg: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; padding-top: 75px; }
        
        .header-tabs { position: fixed; top: 0; width: 100%; background: var(--primary); display: flex; box-shadow: 0 2px 8px rgba(0,0,0,0.2); z-index: 1000; overflow-x: auto; }
        .tab-item { flex: 1; text-align: center; padding: 20px 10px; font-size: 10px; font-weight: 700; color: #94a3b8; cursor: pointer; text-transform: uppercase; white-space: nowrap; border-bottom: 4px solid transparent; }
        .tab-item.active { color: white; background: rgba(255,255,255,0.05); border-bottom: 4px solid var(--accent); }

        .container { max-width: 600px; margin: auto; padding: 15px; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        .form-group { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 25px; }
        label { font-size: 11px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 5px; display: block; }
        input, select { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 16px; box-sizing: border-box; background: #f8fafc; }
        
        .btn { width: 100%; padding: 18px; border: none; border-radius: 10px; color: white; font-weight: 700; font-size: 16px; cursor: pointer; margin-bottom: 10px; }
        .btn-entry { background: var(--entry); }
        .btn-exit { background: var(--exit); }
        .btn-add { background: var(--accent); }

        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 6px solid #64748b; }
        .alert-card { border-left-color: var(--warning); background: #fffbeb; }
        
        .table-container { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f8fafc; padding: 12px; text-align: left; font-size: 10px; color: #64748b; border-bottom: 2px solid #f1f5f9; }
        td { padding: 15px 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        
        .badge { font-size: 10px; padding: 3px 6px; border-radius: 4px; font-weight: bold; }
        .badge-red { background: #fee2e2; color: #ef4444; }
        .badge-orange { background: #ffedd5; color: #f59e0b; }
        
        #reader-entry, #reader-exit { width: 100%; border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 20px; border: 2px solid #cbd5e1; }
    </style>
</head>
<body>

<nav class="header-tabs">
    <div id="tab-ent" class="tab-item active" onclick="switchTab('entrada')">Entrada</div>
    <div id="tab-sai" class="tab-item" onclick="switchTab('saida')">Saída</div>
    <div id="tab-est" class="tab-item" onclick="switchTab('estoque')">Depósito</div>
    <div id="tab-rel" class="tab-item" onclick="switchTab('relatorio')">Relatório</div>
    <div id="tab-his" class="tab-item" onclick="switchTab('historico')">Histórico</div>
</nav>

<div class="container">
    
    <!-- ENTRADA -->
    <div id="page-entrada" class="page active">
        <div id="reader-entry"></div>
        <div class="form-group">
            <label>Código de Barras</label>
            <input type="text" id="ent-code" placeholder="Escanear...">
            <label>Nome do Material</label>
            <input type="text" id="ent-nome" placeholder="Nome">
            <label>Validade</label>
            <input type="date" id="ent-validade">
            <label>Unidade</label>
            <select id="ent-unidade">
                <option value="kg">kg</option><option value="g">g</option>
                <option value="un">un</option><option value="lata">lata</option>
                <option value="litro">litro</option><option value="pacote">pacote</option>
            </select>
            <label>Qtd</label>
            <input type="number" id="ent-qtd" value="1">
            <button class="btn btn-entry" onclick="processar('ENTRADA')">REGISTRAR ENTRADA</button>
        </div>
    </div>

    <!-- SAÍDA -->
    <div id="page-saida" class="page">
        <div id="reader-exit"></div>
        <div class="form-group">
            <label>Código de Barras</label>
            <input type="text" id="sai-code" placeholder="Escanear...">
            <label>Quantidade</label>
            <input type="number" id="sai-qtd" value="1">
            <button class="btn btn-exit" onclick="processar('SAIDA')">REGISTRAR SAÍDA</button>
        </div>
    </div>

    <!-- DEPÓSITO -->
    <div id="page-estoque" class="page">
        <button class="btn btn-add" onclick="switchTab('entrada')">+ ADICIONAR NOVO ITEM</button>
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Material</th><th style="text-align:center">Saldo</th><th>Ações</th></tr>
                </thead>
                <tbody id="tabela-estoque"></tbody>
            </table>
        </div>
    </div>

    <!-- RELATÓRIO -->
    <div id="page-relatorio" class="page">
        <label>⚠️ ALERTAS DE VENCIMENTO (Próximos 15 dias)</label>
        <div id="alertas-vencimento"></div>
        
        <label style="margin-top:20px">📊 RESUMO DE CONSUMO GERAL</label>
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Item</th><th>Total Saído</th><th>Validade</th></tr>
                </thead>
                <tbody id="tabela-relatorio"></tbody>
            </table>
        </div>
    </div>

    <!-- HISTÓRICO -->
    <div id="page-historico" class="page">
        <div id="logs-geral"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "COLE_AQUI",
        authDomain: "COLE_AQUI",
        databaseURL: "COLE_AQUI",
        projectId: "COLE_AQUI",
        storageBucket: "COLE_AQUI",
        messagingSenderId: "COLE_AQUI",
        appId: "COLE_AQUI"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    let html5QrCode;

    async function switchTab(tab) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
        document.getElementById('page-' + tab).classList.add('active');
        document.getElementById('tab-' + tab.substring(0,3)).classList.add('active');

        if (html5QrCode) { try { await html5QrCode.stop(); } catch(e) {} }
        const divId = tab === 'entrada' ? 'reader-entry' : (tab === 'saida' ? 'reader-exit' : null);
        if (divId) {
            html5QrCode = new Html5Qrcode(divId);
            html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: { width: 250, height: 150 } }, (text) => {
                const prefix = tab === 'entrada' ? 'ent' : 'sai';
                document.getElementById(prefix + '-code').value = text;
                database.ref('estoque/' + text).once('value', snap => {
                    if(snap.exists() && tab === 'entrada') {
                        document.getElementById('ent-nome').value = snap.val().nome;
                        document.getElementById('ent-unidade').value = snap.val().unidade || 'un';
                    }
                });
            });
        }
    }

    function processar(tipo) {
        const prefix = tipo === 'ENTRADA' ? 'ent' : 'sai';
        const code = document.getElementById(prefix + '-code').value;
        const qtd = parseInt(document.getElementById(prefix + '-qtd').value);
        if (!code || isNaN(qtd)) return alert("Preencha os dados!");

        const itemRef = database.ref('estoque/' + code);
        itemRef.once('value', snap => {
            let dados = snap.val() || { nome: code, saldo: 0, totalSaida: 0 };
            
            if (tipo === 'ENTRADA') {
                const nome = document.getElementById('ent-nome').value || dados.nome;
                const unidade = document.getElementById('ent-unidade').value;
                const validade = document.getElementById('ent-validade').value || dados.validade || "";
                itemRef.update({ 
                    nome, unidade, validade, 
                    saldo: dados.saldo + qtd 
                });
            } else {
                if (dados.saldo < qtd) return alert("Saldo insuficiente!");
                itemRef.update({ 
                    saldo: dados.saldo - qtd, 
                    totalSaida: (dados.totalSaida || 0) + qtd 
                });
            }

            database.ref('logs').push({
                tipo, code, nome: dados.nome, qtd, data: new Date().toLocaleString()
            });
            document.getElementById(prefix + '-code').value = '';
        });
    }

    database.ref('estoque').on('value', snap => {
        const tbEstoque = document.getElementById('tabela-estoque');
        const tbRelatorio = document.getElementById('tabela-relatorio');
        const alertaDiv = document.getElementById('alertas-vencimento');
        
        tbEstoque.innerHTML = ''; tbRelatorio.innerHTML = ''; alertaDiv.innerHTML = '';
        
        let itens = [];
        snap.forEach(c => { let i = c.val(); i.id = c.key; itens.push(i); });
        itens.sort((a, b) => a.nome.localeCompare(b.nome));

        const hoje = new Date();
        const limiteAviso = new Date();
        limiteAviso.setDate(hoje.getDate() + 15);

        itens.forEach(item => {
            // Depósito
            tbEstoque.innerHTML += `<tr><td><b>${item.nome}</b></td><td align="center">${item.saldo} ${item.unidade}</td>
            <td><button onclick="if(confirm('Remover?')) database.ref('estoque/${item.id}').remove()" style="border:none;background:none">🗑️</button></td></tr>`;

            // Relatório e Vencimento
            let statusVencimento = "";
            if (item.validade) {
                const dataVal = new Date(item.validade);
                if (dataVal <= hoje) {
                    statusVencimento = '<span class="badge badge-red">VENCIDO</span>';
                    alertaDiv.innerHTML += `<div class="card alert-card"><b>${item.nome}</b> <span class="badge badge-red">VENCIDO EM ${item.validade}</span></div>`;
                } else if (dataVal <= limiteAviso) {
                    statusVencimento = '<span class="badge badge-orange">VENCE EM BREVE</span>';
                    alertaDiv.innerHTML += `<div class="card alert-card"><b>${item.nome}</b> <span class="badge badge-orange">VENCE EM ${item.validade}</span></div>`;
                }
            }

            tbRelatorio.innerHTML += `<tr><td>${item.nome}<br>${statusVencimento}</td><td>${item.totalSaida || 0} ${item.unidade}</td><td>${item.validade || '-'}</td></tr>`;
        });
        if(alertaDiv.innerHTML === "") alertaDiv.innerHTML = "<small>Nenhum item vencendo nos próximos 15 dias.</small>";
    });

    database.ref('logs').limitToLast(15).on('value', snap => {
        const div = document.getElementById('logs-geral');
        div.innerHTML = '';
        snap.forEach(c => {
            const l = c.val();
            div.innerHTML = `<div class="card" style="border-left-color:${l.tipo === 'ENTRADA' ? '#10b981' : '#ef4444'}"><div><b>${l.tipo}: ${l.qtd} de ${l.nome}</b><br><small>${l.data}</small></div></div>` + div.innerHTML;
        });
    });
</script>
</body>
</html>

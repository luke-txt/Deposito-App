<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depósito Lucas - Scan Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        /* Mantenha o CSS que te passei antes aqui */
        :root { --primary: #039be5; --entry: #2e7d32; --exit: #c62828; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; background: white; border-radius: 12px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #reader { width: 100%; border-radius: 8px; margin-bottom: 15px; overflow: hidden; }
        input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; }
        .btn-entry { background: var(--entry); }
        .btn-exit { background: var(--exit); }
        .list-container { margin-top: 20px; border-top: 2px solid #eee; padding-top: 10px; }
        .item-log { font-size: 13px; padding: 8px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="container">
    <h2>📦 Depósito Cloud</h2>
    <div id="reader"></div> <input type="text" id="barcode" placeholder="Aguardando scan...">
    <input type="text" id="nome" placeholder="Nome do Material">
    <input type="number" id="qtd" value="1">

    <div class="btn-group">
        <button class="btn btn-entry" onclick="enviar('ENTRADA')">INCLUIR</button>
        <button class="btn btn-exit" onclick="enviar('SAIDA')">BAIXA</button>
    </div>

    <div class="list-container">
        <h3>Últimas Movimentações</h3>
        <div id="logs-nuvem">Carregando...</div>
    </div>
</div>

<script>
    // 1. AS CONFIGURAÇÕES DO SEU FIREBASE QUE VOCÊ PEGOU NO SITE
    const firebaseConfig = {
        apiKey: "AIzaSyA-2SH_h57k24EKQXLjOkWsrs70tbSbFGE",
    authDomain: "depositorancho-43b21.firebaseapp.com",
    databaseURL: "https://depositorancho-43b21-default-rtdb.firebaseio.com",
    projectId: "depositorancho-43b21",
    storageBucket: "depositorancho-43b21.firebasestorage.app",
    messagingSenderId: "883363350930",
    appId: "1:883363350930:web:3da976d452d26837ef994b"
    
    };

    // Inicializa Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 2. CONFIGURAÇÃO DO SCANNER RÁPIDO (CÓDIGO NOVO)
    const html5QrCode = new Html5Qrcode("reader");
    const scannerConfig = { 
        fps: 20, 
        qrbox: { width: 280, height: 150 },
        aspectRatio: 1.0 
    };

    const startScanner = () => {
        html5QrCode.start(
            { facingMode: "environment" }, 
            scannerConfig,
            (decodedText) => {
                document.getElementById('barcode').value = decodedText;
                
                // Busca o nome do material no Firebase assim que escaneia
                database.ref('estoque/' + decodedText).once('value', (snap) => {
                    if(snap.exists()) {
                        document.getElementById('nome').value = snap.val().nome;
                    } else {
                        document.getElementById('nome').value = '';
                        document.getElementById('nome').focus();
                    }
                });
            },
            (err) => { /* ignora erros de busca */ }
        ).catch(err => console.error("Erro na câmera", err));
    };

    // Inicia a câmera assim que abre o site
    window.addEventListener('DOMContentLoaded', startScanner);

    // 3. FUNÇÃO DE ENVIAR PARA O CLOUD
    function enviar(tipo) {
        const code = document.getElementById('barcode').value;
        const nome = document.getElementById('nome').value || code;
        const qtd = parseInt(document.getElementById('qtd').value);

        if(!code) return alert("Escaneie algo!");

        const itemRef = database.ref('estoque/' + code);
        
        itemRef.once('value', (snapshot) => {
            let saldoAtual = (snapshot.val() && snapshot.val().saldo) ? snapshot.val().saldo : 0;
            let novoSaldo = (tipo === 'ENTRADA') ? saldoAtual + qtd : saldoAtual - qtd;

            if(novoSaldo < 0) return alert("Saldo insuficiente!");

            itemRef.update({ nome: nome, saldo: novoSaldo });
            database.ref('logs').push({
                tipo, code, nome, qtd, data: new Date().toLocaleString()
            });

            document.getElementById('barcode').value = '';
            document.getElementById('nome').value = '';
        });
    }

    // 4. LISTAGEM EM TEMPO REAL
    database.ref('logs').limitToLast(10).on('value', (snapshot) => {
        const logsDiv = document.getElementById('logs-nuvem');
        logsDiv.innerHTML = '';
        snapshot.forEach((child) => {
            const log = child.val();
            logsDiv.innerHTML = `
                <div class="item-log">
                    <span><strong>${log.tipo}</strong>: ${log.nome} (x${log.qtd})</span>
                    <span style="color:#888">${log.data.split(' ')[1]}</span>
                </div>
            ` + logsDiv.innerHTML;
        });
    });
</script>

</body>
</html>

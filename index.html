<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEPÓSITO INTELLIGENCE V8</title>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2897/2897785.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root { --primary: #0f172a; --accent: #3b82f6; --entry: #10b981; --exit: #ef4444; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); margin: 0; color: #1e293b; }
        
        /* Telas */
        #login-screen { position: fixed; inset: 0; background: var(--primary); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .glass-box { background: white; padding: 40px; border-radius: 24px; width: 90%; max-width: 400px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        
        .nav-header { position: fixed; top: 0; width: 100%; background: var(--primary); display: flex; z-index: 1000; overflow-x: auto; }
        .nav-item { flex: 1; text-align: center; padding: 20px 10px; font-size: 10px; font-weight: 800; color: #64748b; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .nav-item.active { color: white; border-bottom: 4px solid var(--accent); background: rgba(255,255,255,0.05); }

        .container { max-width: 700px; margin: 90px auto 30px; padding: 0 20px; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; margin-bottom: 20px; }
        input, select { width: 100%; padding: 16px; margin: 10px 0; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 18px; border: none; border-radius: 12px; color: white; font-weight: 700; cursor: pointer; font-size: 15px; }
        .btn-primary { background: var(--accent); }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="glass-box">
        <h2 style="text-align:center; margin-top:0">Acesso Intelligence</h2>
        <input type="text" id="user-input" placeholder="Usuário">
        <input type="password" id="pass-input" placeholder="Senha">
        <button class="btn btn-primary" onclick="autenticar()">CONECTAR</button>
    </div>
</div>

<nav class="nav-header" id="main-nav" style="display:none">
    <div id="tab-ent" class="nav-item admin-only" onclick="switchTab('entrada')">Entrada</div>
    <div id="tab-sai" class="nav-item" onclick="switchTab('saida')">Saída</div>
    <div id="tab-est" class="nav-item" onclick="switchTab('estoque')">Depósito</div>
    <div id="tab-rel" class="nav-item admin-only" onclick="switchTab('relatorio')">Relatórios</div>
    <div id="tab-cfg" class="nav-item admin-only" onclick="switchTab('config')">⚙️</div>
</nav>

<div class="container" id="app-content" style="display:none">
    <div id="page-entrada" class="page"><div id="reader-entry"></div><div class="card">...campos entrada...</div></div>
    <div id="page-saida" class="page"><div id="reader-exit"></div><div class="card">...campos saída...</div></div>
    
    <div id="page-estoque" class="page">
        <div class="card">
            <input type="text" id="filtro-estoque" onkeyup="renderEstoque()" placeholder="Pesquisar e Somar...">
            <div id="soma-total" style="font-weight:800; color:var(--accent)"></div>
        </div>
        <div id="lista-estoque"></div>
    </div>

    <!-- ABA CONFIGURAÇÃO (ADMIN) -->
    <div id="page-config" class="page">
        <div class="card">
            <h3>Gerenciar Senhas</h3>
            <label>Nova Senha Admin</label>
            <input type="password" id="new-pass-admin">
            <button class="btn btn-primary" onclick="alterarSenha('admin')">Atualizar Admin</button>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <label>Nova Senha Operador</label>
            <input type="password" id="new-pass-operador">
            <button class="btn btn-primary" onclick="alterarSenha('operador')">Atualizar Operador</button>
        </div>
    </div>
</div>

<script>
    // CONFIGURAÇÃO FIREBASE
    const firebaseConfig = {
  apiKey: "AIzaSyA-2SH_h57k24EKQXLjOkWsrs70tbSbFGE",
  authDomain: "depositorancho-43b21.firebaseapp.com",
  databaseURL: "https://depositorancho-43b21-default-rtdb.firebaseio.com",
  projectId: "depositorancho-43b21",
  storageBucket: "depositorancho-43b21.firebasestorage.app",
  messagingSenderId: "883363350930",
  appId: "1:883363350930:web:3da976d452d26837ef994b"
};
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // CRIAR SENHAS INICIAIS NO FIREBASE (Rodar apenas uma vez se necessário)
    function setupInicial() {
        database.ref('config/usuarios/admin').set({ pass: 'admin123', nivel: 'ADMIN' });
        database.ref('config/usuarios/saida').set({ pass: 'user123', nivel: 'OPERADOR' });
    }

    function autenticar() {
        const u = document.getElementById('user-input').value;
        const p = document.getElementById('pass-input').value;

        database.ref('config/usuarios/' + u).once('value', snap => {
            const user = snap.val();
            if(user && user.pass === p) {
                iniciarApp(user.nivel);
            } else {
                alert("Usuário ou senha incorretos");
            }
        });
    }

    function alterarSenha(perfil) {
        const novaSenha = perfil === 'admin' ? document.getElementById('new-pass-admin').value : document.getElementById('new-pass-operador').value;
        const dbPath = perfil === 'admin' ? 'admin' : 'saida';
        
        if(!novaSenha) return alert("Digite a nova senha");
        
        database.ref('config/usuarios/' + dbPath).update({ pass: novaSenha })
            .then(() => alert("Senha do " + perfil + " alterada com sucesso!"))
            .catch(() => alert("Erro ao alterar senha"));
    }

    function iniciarApp(nivel) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('main-nav').style.display = 'flex';
        document.getElementById('app-content').style.display = 'block';
        if(nivel === 'OPERADOR') {
            document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'none');
            switchTab('saida');
        } else {
            switchTab('entrada');
        }
    }
    // ... manter funções de switchTab, processar e renderEstoque da v7 ...
</script>
</body>
</html>

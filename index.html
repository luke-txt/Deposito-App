<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Depósito Inteligente</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #f4f4f9; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #reader { width: 100%; border-radius: 8px; overflow: hidden; margin-bottom: 15px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button.delete { background: #dc3545; margin-top: 20px; font-size: 12px; }
        .item { background: #eee; padding: 10px; margin-top: 5px; border-radius: 4px; display: flex; justify-content: space-between; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📦 Saída de Materiais</h2>
    
    <div id="reader"></div>
    
    <input type="text" id="barcode-input" placeholder="Código de Barras escaneado">
    <input type="number" id="qty-input" placeholder="Quantidade" value="1">
    <button onclick="registrarSaida()">Confirmar Saída</button>

    <h3>Histórico do Dia</h3>
    <div id="lista-estoque"></div>

    <button class="delete" onclick="limparHistorico()">Limpar Tudo</button>
</div>

<script>
    // 1. Inicializa o Scanner
    const scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
    scanner.render((text) => {
        document.getElementById('barcode-input').value = text;
        // Opcional: emitir um sinal sonoro aqui
    });

    // 2. Carregar dados ao abrir a página
    document.addEventListener('DOMContentLoaded', carregarDados);

    function registrarSaida() {
        const code = document.getElementById('barcode-input').value;
        const qty = document.getElementById('qty-input').value;
        
        if(!code || qty <= 0) return alert("Preencha o código e a quantidade!");

        const novaSaida = {
            codigo: code,
            quantidade: qty,
            hora: new Date().toLocaleTimeString()
        };

        // Salvar no LocalStorage
        const historico = JSON.parse(localStorage.getItem('deposito_dados') || '[]');
        historico.push(novaSaida);
        localStorage.setItem('deposito_dados', JSON.stringify(historico));

        renderizarLista();
        document.getElementById('barcode-input').value = '';
    }

    function carregarDados() {
        renderizarLista();
    }

    function renderizarLista() {
        const listaDiv = document.getElementById('lista-estoque');
        const historico = JSON.parse(localStorage.getItem('deposito_dados') || '[]');
        
        listaDiv.innerHTML = historico.map(item => `
            <div class="item">
                <span><strong>${item.codigo}</strong> (x${item.quantidade})</span>
                <span style="color: #666">${item.hora}</span>
            </div>
        `).reverse().join(''); // Mostra o mais recente primeiro
    }

    function limparHistorico() {
        if(confirm("Deseja apagar todo o histórico de hoje?")) {
            localStorage.removeItem('deposito_dados');
            renderizarLista();
        }
    }
</script>

</body>
</html>
